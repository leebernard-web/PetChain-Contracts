name: Stellar Contracts CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: read-all

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: stellar-contracts
        run: cargo audit --deny warnings

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage report
        working-directory: stellar-contracts
        run: cargo tarpaulin --out Xml --timeout 300 --exclude-files tests/* --output-dir coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./stellar-contracts/coverage/cobertura.xml
          flags: stellar-contracts
          fail_ci_if_error: false

  stellar-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Build Stellar contracts
        working-directory: stellar-contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Test Stellar contracts
        working-directory: stellar-contracts
        run: cargo test
